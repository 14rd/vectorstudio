<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<script>
// GitHub Pages SPA redirect: preserve the path for client-side routing
var path = window.location.pathname;
var search = window.location.search;
window.location.replace(window.location.origin + '/?route=' + encodeURIComponent(path + search));
</script>
</head>
<body></body>
</html>
