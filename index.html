<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vector Studio</title>
<meta name="description" content="Vector Studio — An identity-led creative studio. CGI, brand identity, web, product design, art direction." />
<meta property="og:title" content="Vector Studio" />
<meta property="og:description" content="An identity-led creative studio. CGI, brand identity, web, product design, art direction." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://14rd.com" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23000'/></svg>" />
<style>
  :root {
    --bg: #ffffff;
    --fg: #000000;
    --fg-mid: #3a3a3a;
    --fg-dim: #8a8a8a;
    --line: rgba(0,0,0,0.12);
    --sans: "neue-haas-unica", "Neue Haas Unica", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: var(--sans); overflow: hidden; height: 100%;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "kern";
  }
  *::selection { background: var(--fg); color: var(--bg); }
  * { -webkit-tap-highlight-color: transparent; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #detail-scroll::-webkit-scrollbar { width: 0; }
  #detail-scroll { scrollbar-width: none; }

  button:focus-visible, a:focus-visible { outline: 1px solid #000; outline-offset: 2px; }

  /* GPU-composited card layer */
  .gallery-card {
    will-change: transform, opacity;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    -webkit-transform-style: flat;
    transform-style: flat;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>
  var PROJECTS = [
    { id: "01", title: "AI Systems",            subtitle: "Manchester Airport Hotels - Cinematic films exploring AI.",   client: "MA Hotels",             year: "2025", role: "Creative Direction, Design, CGI", discipline: "CGI",      cover: "assets/covers/MAHOTELS.png",            blurb: "For MA Hotels (Manchester Airport Hotels), we created a cinematic film exploring how robotics and AI may shape the future identity of luxury hospitality. The film imagines how autonomous systems could quietly integrate into the guest experience of tomorrow's hotels." },
    { id: "02", title: "Demone Della Velocità", subtitle: "Dainese - Developing cinematic visual narratives.", client: "Dainese",               year: "2025", role: "Creative Direction, CGI",          discipline: "CGI",      cover: "assets/covers/DAINESE.png",             blurb: "For Dainese, we created a cinematic visual narrative bringing the brand's bikes, gear, and more to life. Directed, animated, and visualised with precision, the film explores materiality, light, and form, expressing the technical sophistication and identity of the Dainese brand." },
    { id: "03", title: "LK001",                 subtitle: "Loho Kur - Defining visual marketing.",                    client: "Loho Kur",              year: "2026", role: "Creative Direction, CGI",          discipline: "CGI",      cover: "assets/covers/LK001.png",               blurb: "For Loho Kur, we brought a new collection and identity to life through cinematic animation, expressing his new collection code system and new direction." },
    { id: "04", title: "Erosion",               subtitle: "James Jefferys x Zellerfeld - Full product design and campaign.", client: "Zellerfeld",            year: "2025", role: "Creative Direction, Design, CGI", discipline: "CGI",      cover: "assets/covers/EROSION.png",             blurb: "Erosion is a sculptural footwear piece released through Zellerfeld. Drawing inspiration from geological erosion, we designed, animated, and visualised the form, creating a fully digital-to-physical product." },
    { id: "05", title: "Akan Chief Glasses",    subtitle: "Vic Mensa - 1/1 product design.",                   client: "Vic Mensa",             year: "2025", role: "Creative Direction, Design, CGI", discipline: "Design",   cover: "assets/covers/VICMENSA.png",            blurb: "For Vic Mensa, we designed and engineered a one-of-one pair of gold Akan Chief glasses, precisely modelled to his head. The piece transforms heritage symbolism into a sculptural object, crafted as a powerful expression of personal identity." },
    { id: "06", title: "Diamond Grill Auction", subtitle: "Sotheby's x Ian Delucca - Visuals to secure auction.",     client: "Sotheby's",             year: "2024", role: "CGI",                              discipline: "CGI",      cover: "assets/covers/SOTHEBYS.png",            blurb: "For Sotheby's, we fully visualised a bespoke diamond grillz piece ahead of physical creation. The work translated the object into a precise digital asset, allowing the piece to be presented, communicated, and valued before it existed. This process enabled a high-stakes sale environment with an estimated valuation of $3–5M, demonstrating how digital visualisation can shape perception and market value around rare objects." },
    { id: "07", title: "Piza",                  subtitle: "Stephanie Piza - Full brand identity.",              client: "Piza",                  year: "2025", role: "Creative Direction, Brand Identity", discipline: "Identity", cover: "assets/covers/PIZA.png",                blurb: "For Piza, we built the full brand architecture — defining the strategic identity, typography, and visual systems. Designed as a unified structure, the brand projects clarity, confidence, and a commanding presence from launch." },
    { id: "08", title: "14 Red Door",           subtitle: "14 Red Door - Full brand identity.",                 client: "14 Red Door",           year: "2025", role: "Creative Direction, Brand Identity", discipline: "Identity", cover: "assets/covers/14REDDOOR.png",           blurb: "We created the complete identity for 14 Red Door — from naming and brand architecture to typography and visual language. Inspired by a fragmented childhood memory of a home long forgotten, the identity centres on the symbolism of a door: a threshold between the known and unknown, representing possibility and the idea that something powerful may exist beyond what is visible." },
    { id: "09", title: "Setting Sun",           subtitle: "Hikari no Yami - Campaign imagery.",              client: "Hikari no Yami",        year: "2025", role: "Creative Direction",               discipline: "Direction",cover: "assets/covers/SETTINGSUN.png",          blurb: "We directed Chapter 8 of the campaign through a refined visual identity system — delivering cohesive, high-impact graphics that strengthened narrative continuity and brand distinction." },
    { id: "10", title: "Studio James Jefferys", subtitle: "James Jefferys - Website design and development.",              client: "Studio James Jefferys", year: "2026", role: "Creative Direction, Web Design",   discipline: "Web",      cover: "assets/covers/STUDIOJAMESJEFFERYS.png", blurb: "We created a single-surface interface designed to function as a singular digital skin. Inspired by the idea that the most intuitive interface is the human body, the system reduces interaction to its essential elements — exploring subtraction as a method for clarity and control." }
  ];
  function coverBg(project) {
    return "#f2efe9 url(\"" + project.cover + "\") center/cover no-repeat";
  }
  window.PROJECTS = PROJECTS;
  window.coverBg = coverBg;
  </script>

  <script type="text/babel">
    const { useEffect, useRef, useState, useCallback } = React;

    function isMobile() { return window.innerWidth <= 768; }

    /* ===================== GALLERY ===================== */
    /* Performance-critical: uses refs + direct DOM updates instead of
       React state for the animation loop. This avoids re-rendering
       10 cards × 60fps = 600 React diffs/second which kills Safari. */
    function Gallery({ projects, onEnter }) {
      const n = projects.length;
      const [hoverIdx, setHoverIdx] = useState(null);
      const [entering, setEntering] = useState(null);

      const progressRef = useRef(0);
      const targetRef = useRef(0);
      const mouseRef = useRef({ x: 0.5, y: 0.5 });
      const hoverRef = useRef(null);
      const rafRef = useRef(null);
      const stageRef = useRef(null);
      const wrapperRef = useRef(null);
      const cardRefs = useRef([]);
      const bannerRef = useRef(null);
      const bannerTitleRef = useRef(null);
      const bannerSubRef = useRef(null);
      const lastBannerIdx = useRef(-1);

      const mobile = isMobile();
      const cardW = mobile ? 280 : 520;
      const cardH = mobile ? 183 : 340;
      const spreadX = mobile ? 200 : 360;

      // Keep hoverRef in sync
      useEffect(() => { hoverRef.current = hoverIdx; }, [hoverIdx]);

      // Main animation loop — direct DOM updates, no React state
      useEffect(() => {
        if (entering) return;
        var last = performance.now();
        const tick = (t) => {
          var dt = Math.min(64, t - last); last = t;

          // Mouse-driven auto-scroll (desktop only)
          if (!mobile && hoverRef.current == null) {
            var mx = mouseRef.current.x;
            var dx = mx - 0.5;
            var sign = dx > 0 ? 1 : (dx < 0 ? -1 : 0);
            var mag = Math.max(0, Math.abs(dx) - 0.28);
            var velocity = sign * mag * mag * 3.0;
            if (mag > 0) {
              targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + velocity * (dt / 1000)));
            }
          }

          // Smooth progress lerp
          var delta = targetRef.current - progressRef.current;
          if (Math.abs(delta) > 0.0005) {
            progressRef.current += delta * 0.11;
          } else {
            progressRef.current = targetRef.current;
          }

          var progress = progressRef.current;

          // Parallax on wrapper (desktop only)
          if (!mobile && wrapperRef.current) {
            var mx2 = mouseRef.current.x, my2 = mouseRef.current.y;
            wrapperRef.current.style.transform =
              "translate3d(" + ((mx2 - 0.5) * 28) + "px, " + ((my2 - 0.5) * 18) + "px, 0) rotateX(" + (-(my2 - 0.5) * 8) + "deg) rotateY(" + ((mx2 - 0.5) * 12) + "deg)";
          }

          // Update each card transform directly
          var activeIdx = hoverRef.current != null ? hoverRef.current : Math.max(0, Math.min(n - 1, Math.round(progress)));
          for (var i = 0; i < n; i++) {
            var el = cardRefs.current[i];
            if (!el) continue;
            var o = i - progress;
            var x = o * spreadX;
            var y = ((((i % n) + n) % n) * 53) % 130 - 65 + o * 6;
            var z = -Math.abs(o) * (mobile ? 150 : 220);
            var rot = Math.sin(i * 1.3) * 3.2;
            var opacity = Math.abs(o) > 5 ? 0 : 1;
            var baseZ = 1000 - Math.abs(Math.round(o * 10));

            var cardCenterX = 0.5 + (i - progress) * 0.18;
            var distToMouse = Math.abs(cardCenterX - mouseRef.current.x);
            var proximityZ = Math.round(500 - distToMouse * 1000);

            el.style.transform = "translate3d(calc(-50% + " + x + "px), calc(-50% + " + y + "px), " + z + "px) rotate(" + rot + "deg)";
            el.style.opacity = opacity;
            el.style.zIndex = (hoverRef.current === i ? 3000 : proximityZ + baseZ);
          }

          // Update banner text (only when active project changes)
          if (activeIdx !== lastBannerIdx.current) {
            lastBannerIdx.current = activeIdx;
            var proj = projects[activeIdx];
            if (bannerSubRef.current) bannerSubRef.current.textContent = proj.subtitle || proj.client;
            if (bannerTitleRef.current) {
              bannerTitleRef.current.textContent = proj.title;
              bannerTitleRef.current.style.animation = "none";
              bannerTitleRef.current.offsetHeight; // force reflow
              bannerTitleRef.current.style.animation = "rise 0.55s cubic-bezier(.2,.7,.2,1)";
            }
          }

          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [entering, n, mobile, spreadX, projects]);

      // Wheel
      useEffect(() => {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var onWheel = function(e) {
          e.preventDefault();
          targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + (e.deltaY + e.deltaX) * 0.0025));
        };
        el.addEventListener("wheel", onWheel, { passive: false });
        return () => el.removeEventListener("wheel", onWheel);
      }, [entering, n]);

      // Keyboard
      useEffect(() => {
        if (entering) return;
        var onKey = function(e) {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") targetRef.current = Math.min(n - 1, Math.round(targetRef.current) + 1);
          else if (e.key === "ArrowLeft" || e.key === "ArrowUp") targetRef.current = Math.max(0, Math.round(targetRef.current) - 1);
          else if (e.key === "Enter") onEnter(projects[Math.max(0, Math.min(n - 1, Math.round(progressRef.current)))]);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [entering, onEnter, projects, n]);

      // Drag / touch
      useEffect(() => {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var startX = 0, startProg = 0, dragging = false;
        var onDown = function(e) {
          dragging = true;
          startX = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          startProg = targetRef.current;
        };
        var onMove = function(e) {
          if (!dragging) return;
          var x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          var dx = startX - x;
          targetRef.current = Math.max(0, Math.min(n - 1, startProg + dx * 0.006));
        };
        var onUp = function() { dragging = false; };
        el.addEventListener("mousedown", onDown);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
        el.addEventListener("touchstart", onDown, { passive: true });
        window.addEventListener("touchmove", onMove, { passive: true });
        window.addEventListener("touchend", onUp);
        return () => {
          el.removeEventListener("mousedown", onDown);
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
          el.removeEventListener("touchstart", onDown);
          window.removeEventListener("touchmove", onMove);
          window.removeEventListener("touchend", onUp);
        };
      }, [entering, n]);

      // Mouse position (ref only, no state)
      useEffect(() => {
        var el = stageRef.current; if (!el) return;
        var onMove = function(e) {
          var r = el.getBoundingClientRect();
          mouseRef.current = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
        };
        el.addEventListener("mousemove", onMove);
        return () => el.removeEventListener("mousemove", onMove);
      }, []);

      var handleEnter = function(project) {
        setEntering(project);
        setTimeout(function() { onEnter(project); }, 900);
      };

      return (
        <div
          ref={stageRef}
          style={{
            position: "fixed", inset: 0,
            background: "var(--bg)",
            perspective: mobile ? "1200px" : "1800px",
            perspectiveOrigin: "50% 50%",
            overflow: "hidden",
            userSelect: "none",
            touchAction: "none"
          }}
        >
          <div ref={wrapperRef} style={{
            position: "absolute", inset: 0,
            WebkitTransformStyle: "preserve-3d",
            transformStyle: "preserve-3d",
            transition: mobile ? "none" : "transform 0.5s cubic-bezier(.2,.7,.2,1)",
            pointerEvents: "none"
          }}>
            {projects.map(function(p, i) {
              var isEntering = entering && entering.id === p.id;

              var enterStyle = isEntering ? {
                transform: "translate3d(-50%, -50%, 500px) scale(2)",
                opacity: 0,
                transition: "transform 0.9s cubic-bezier(.6,.02,.2,1), opacity 0.9s"
              } : entering ? {
                opacity: 0,
                transition: "opacity 0.35s"
              } : {};

              return (
                <div
                  key={p.id}
                  ref={function(el) { cardRefs.current[i] = el; }}
                  className="gallery-card"
                  onMouseEnter={function() { setHoverIdx(i); }}
                  onMouseLeave={function() { setHoverIdx(function(cur) { return cur === i ? null : cur; }); }}
                  onClick={function() { handleEnter(p); }}
                  style={{
                    position: "absolute", left: "50%", top: "50%",
                    width: cardW, height: cardH,
                    pointerEvents: "auto",
                    cursor: "pointer",
                    zIndex: isEntering ? 9999 : 1000,
                    ...enterStyle
                  }}
                >
                  <div style={{
                    position: "relative", width: "100%", height: "100%",
                    transform: hoverIdx === i ? "scale(1.02)" : "scale(1)",
                    transition: "transform 0.4s"
                  }}>
                    {/* Tinted shadow — desktop only, reduced blur for Safari */}
                    {!mobile && <img
                      src={p.cover}
                      alt=""
                      aria-hidden="true"
                      draggable="false"
                      style={{
                        position: "absolute", inset: 0,
                        width: "100%", height: "100%",
                        objectFit: "contain",
                        filter: "blur(20px) saturate(1.1) brightness(0.92)",
                        opacity: (hoverIdx === i || (!entering && i === Math.max(0, Math.min(n - 1, Math.round(progressRef.current))))) ? 0.5 : 0.28,
                        transform: "translateY(28px) scale(0.96) translateZ(0)",
                        pointerEvents: "none",
                        WebkitBackfaceVisibility: "hidden"
                      }}
                    />}
                    <img
                      src={p.cover}
                      alt={p.title}
                      draggable="false"
                      style={{
                        position: "absolute", inset: 0,
                        width: "100%", height: "100%",
                        objectFit: "contain",
                        transform: "translateZ(0)",
                        userSelect: "none",
                        WebkitUserDrag: "none",
                        WebkitBackfaceVisibility: "hidden"
                      }}
                    />
                  </div>
                </div>
              );
            })}
          </div>

          {/* Active project title — top/bottom center */}
          <div ref={bannerRef} style={{
            position: "absolute", left: "50%",
            top: mobile ? "auto" : 96,
            bottom: mobile ? 48 : "auto",
            transform: "translateX(-50%)",
            textAlign: "center", opacity: entering ? 0 : 1, transition: "opacity 0.4s",
            pointerEvents: "none", maxWidth: "90vw", width: "100%",
            padding: "0 16px", boxSizing: "border-box"
          }}>
            <div ref={bannerSubRef} style={{
              fontFamily: "var(--sans)", fontSize: mobile ? 11 : 12, letterSpacing: "0.02em",
              color: "var(--fg-dim)", marginBottom: mobile ? 10 : 14, fontWeight: 400
            }}>
              {projects[0].subtitle}
            </div>
            <h1 ref={bannerTitleRef} style={{
              fontFamily: "var(--sans)", fontWeight: 400,
              fontSize: mobile ? "clamp(28px, 8vw, 44px)" : "clamp(44px, 6vw, 88px)",
              lineHeight: 0.95, letterSpacing: "-0.03em", margin: 0,
              color: "var(--fg)",
              animation: "rise 0.55s cubic-bezier(.2,.7,.2,1)"
            }}>
              {projects[0].title}
            </h1>
          </div>
        </div>
      );
    }

    /* ===================== PROJECT DETAIL ===================== */
    function ProjectDetail({ project, allProjects, onBack, onNext }) {
      const [mounted, setMounted] = useState(false);
      const mobile = isMobile();
      useEffect(() => {
        var t = setTimeout(function() { setMounted(true); }, 30);
        return () => clearTimeout(t);
      }, []);
      useEffect(() => {
        var el = document.getElementById("detail-scroll");
        if (el) el.scrollTop = 0;
      }, [project.id]);

      var nextIdx = (allProjects.findIndex(function(p) { return p.id === project.id; }) + 1) % allProjects.length;
      var next = allProjects[nextIdx];

      return (
        <div id="detail-scroll" style={{
          position: "fixed", inset: 0, background: "var(--bg)",
          overflow: "auto", zIndex: 10,
          opacity: mounted ? 1 : 0, transition: "opacity 0.5s",
          WebkitOverflowScrolling: "touch"
        }}>
          {/* Hero */}
          <section style={{ position: "relative", height: mobile ? "70vh" : "100vh", width: "100%", overflow: "hidden" }}>
            <img
              src={project.cover}
              alt={project.title}
              style={{
                position: "absolute", inset: 0,
                width: "100%", height: "100%",
                objectFit: "contain",
                background: "#f2efe9",
                transform: mounted ? "scale(1) translateZ(0)" : "scale(1.15) translateZ(0)",
                transition: "transform 1.6s cubic-bezier(.2,.7,.2,1)",
                WebkitBackfaceVisibility: "hidden"
              }}
            />
            <div style={{
              position: "absolute", inset: 0,
              background: "linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.35) 100%)"
            }}/>
            <div style={{
              position: "absolute", left: mobile ? 20 : 32, bottom: mobile ? 32 : 56, right: mobile ? 20 : 32,
              display: "flex", alignItems: mobile ? "flex-start" : "flex-end",
              justifyContent: "space-between",
              gap: mobile ? 24 : 48,
              flexDirection: mobile ? "column" : "row"
            }}>
              <div>
                <div style={{
                  fontFamily: "var(--sans)", fontSize: mobile ? 11 : 13, letterSpacing: "0.02em",
                  color: "rgba(255,255,255,0.78)", marginBottom: mobile ? 12 : 18, fontWeight: 400,
                  textShadow: "0 1px 12px rgba(0,0,0,0.3)"
                }}>
                  {project.subtitle || project.client}
                </div>
                <h1 style={{
                  fontFamily: "var(--sans)", fontWeight: 400,
                  fontSize: mobile ? "clamp(32px, 10vw, 56px)" : "clamp(56px, 9vw, 140px)",
                  lineHeight: 0.9, letterSpacing: "-0.035em", margin: 0,
                  color: "#fff", maxWidth: "14ch",
                  textShadow: "0 2px 40px rgba(0,0,0,0.25)"
                }}>
                  {project.title}
                </h1>
              </div>
              {!mobile && (
                <div style={{
                  fontFamily: "var(--sans)", fontSize: 14, letterSpacing: "0.02em",
                  color: "#fff", maxWidth: 280, textAlign: "right", lineHeight: 1.55,
                  textShadow: "0 1px 12px rgba(0,0,0,0.3)"
                }}>
                  {project.blurb}
                </div>
              )}
            </div>
          </section>

          {/* Essay */}
          <section style={{
            maxWidth: 1200, margin: "0 auto",
            padding: mobile ? "80px 20px 60px" : "140px 32px 80px",
            display: "grid",
            gridTemplateColumns: mobile ? "1fr" : "1fr 2fr",
            gap: mobile ? 48 : 80
          }}>
            <div style={mobile ? {} : { position: "sticky", top: 120, alignSelf: "start" }}>
              <MetaRow label="Client" value={project.client} />
              <MetaRow label="Year" value={project.year} />
              <MetaRow label="Role" value={project.role} />
              <MetaRow label="Discipline" value={project.discipline} />
            </div>
            <div>
              <p style={{
                fontFamily: "var(--sans)", fontWeight: 400,
                fontSize: mobile ? "clamp(18px, 5vw, 22px)" : "clamp(22px, 2.2vw, 30px)",
                lineHeight: 1.3, letterSpacing: "-0.015em",
                color: "var(--fg)", margin: 0, textWrap: "pretty"
              }}>
                {project.blurb}
              </p>
              <div style={{
                marginTop: mobile ? 36 : 56, fontFamily: "var(--sans)", fontSize: mobile ? 14 : 15, lineHeight: 1.7,
                color: "var(--fg-mid)", maxWidth: "62ch", textWrap: "pretty"
              }}>
                <p style={{ margin: 0 }}>
                  The brief arrived as a sentence. We returned it as a system — a small set of rules that could be re-played across surfaces without losing the feeling that made {project.client} worth working with in the first place.
                </p>
              </div>
            </div>
          </section>

          {/* Image grid */}
          <section style={{ padding: mobile ? "20px 20px 80px" : "40px 32px 120px", maxWidth: 1600, margin: "0 auto" }}>
            <div style={{
              display: "grid",
              gridTemplateColumns: mobile ? "1fr" : "repeat(6, 1fr)",
              gap: mobile ? 12 : 16,
              gridAutoRows: "minmax(180px, auto)"
            }}>
              <Shot project={project} style={mobile ? { aspectRatio: "16/10" } : { gridColumn: "1 / 5", gridRow: "span 2", aspectRatio: "16/10" }}/>
              <Shot project={project} style={mobile ? { aspectRatio: "4/5" } : { gridColumn: "5 / 7", aspectRatio: "4/5" }}/>
              <Shot project={project} style={mobile ? { aspectRatio: "4/5" } : { gridColumn: "5 / 7", aspectRatio: "4/5" }}/>
              <Shot project={project} style={mobile ? { aspectRatio: "1/1" } : { gridColumn: "1 / 4", aspectRatio: "1/1" }}/>
              <Shot project={project} style={mobile ? { aspectRatio: "16/9" } : { gridColumn: "4 / 7", aspectRatio: "16/9" }}/>
            </div>
          </section>

          {/* Next project */}
          <section onClick={function() { onNext(next); }} style={{
            position: "relative", height: mobile ? "50vh" : "70vh", cursor: "pointer", overflow: "hidden",
            borderTop: "1px solid var(--line)"
          }}>
            <div style={{ position: "absolute", inset: 0, background: coverBg(next), filter: "brightness(0.85)" }}/>
            <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center", color: "#fff" }}>
              <div>
                <div style={{
                  fontFamily: "var(--sans)", fontSize: mobile ? 11 : 13, letterSpacing: "0.02em",
                  opacity: 0.85, marginBottom: mobile ? 16 : 24,
                  textShadow: "0 1px 12px rgba(0,0,0,0.3)"
                }}>Next project</div>
                <div style={{
                  fontFamily: "var(--sans)", fontWeight: 400,
                  fontSize: mobile ? "clamp(32px, 10vw, 56px)" : "clamp(56px, 8vw, 120px)",
                  lineHeight: 0.9, letterSpacing: "-0.03em",
                  textShadow: "0 2px 40px rgba(0,0,0,0.25)"
                }}>{next.title}</div>
                <div style={{
                  marginTop: mobile ? 20 : 28, fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
                  opacity: 0.75
                }}>Tap to continue →</div>
              </div>
            </div>
          </section>

          {/* Close */}
          <button onClick={onBack} style={{
            position: "fixed", right: mobile ? 16 : 32, top: mobile ? 16 : 32, zIndex: 20,
            background: "rgba(255,255,255,0.85)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)",
            border: "1px solid var(--line)", color: "var(--fg)",
            fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
            padding: mobile ? "10px 14px" : "12px 18px", cursor: "pointer",
            borderRadius: 2, fontWeight: 400
          }}>← Back</button>
        </div>
      );
    }

    function MetaRow({ label, value }) {
      return (
        <div style={{
          display: "grid", gridTemplateColumns: "90px 1fr", gap: 16,
          padding: "14px 0", borderTop: "1px solid var(--line)",
          fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
          fontWeight: 400
        }}>
          <div style={{ color: "var(--fg-dim)" }}>{label}</div>
          <div style={{ color: "var(--fg)" }}>{value}</div>
        </div>
      );
    }

    function Shot({ project, style }) {
      return (
        <div style={{
          position: "relative", overflow: "hidden",
          background: coverBg(project),
          outline: "1px solid var(--line)",
          ...style
        }}>
          <div style={{
            position: "absolute", inset: 0,
            background: "linear-gradient(120deg, rgba(255,255,255,0.1) 0%, transparent 40%, rgba(0,0,0,0.08) 100%)",
            mixBlendMode: "overlay"
          }}/>
        </div>
      );
    }

    /* ===================== NAV ===================== */
    function Nav({ onNav, page }) {
      const mobile = isMobile();
      const [menuOpen, setMenuOpen] = useState(false);
      return (
        <>
          <nav style={{
            position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
            padding: mobile ? "20px 16px" : "28px 32px",
            display: "flex", alignItems: "center",
            justifyContent: "space-between", pointerEvents: "none"
          }}>
            <a href="#" onClick={function(e) { e.preventDefault(); onNav("projects"); setMenuOpen(false); }} style={{
              display: "flex", alignItems: "center", gap: 8, pointerEvents: "auto", cursor: "pointer",
              fontFamily: "var(--sans)", fontWeight: 500, fontSize: mobile ? 14 : 16,
              letterSpacing: "-0.01em", color: "var(--fg)", textDecoration: "none"
            }}>
              <span style={{ display: "inline-block", width: 8, height: 8, background: "var(--fg)", borderRadius: "50%" }}/>
              Vector Studio
            </a>
            {!mobile && (
              <div style={{
                display: "flex", alignItems: "center", gap: 28, pointerEvents: "auto",
                fontFamily: "var(--sans)", fontSize: 13, letterSpacing: "0.01em",
                color: "var(--fg)", fontWeight: 400
              }}>
                <NavLink active={page === "projects"} label="Projects" onClick={function() { onNav("projects"); }} />
                <NavLink active={page === "studio"}   label="Studio"   onClick={function() { onNav("studio"); }} />
                <NavLink active={page === "contact"}  label="Contact"  onClick={function() { onNav("contact"); }} />
              </div>
            )}
            {mobile && (
              <button onClick={function() { setMenuOpen(!menuOpen); }} style={{
                background: "transparent", border: "1px solid var(--fg)",
                color: "var(--fg)", fontFamily: "var(--sans)", fontSize: 11,
                letterSpacing: "0.01em", fontWeight: 400,
                padding: "7px 12px", cursor: "pointer", borderRadius: 2,
                pointerEvents: "auto"
              }}>{menuOpen ? "Close" : "Menu"}</button>
            )}
          </nav>
          {mobile && menuOpen && (
            <div style={{
              position: "fixed", inset: 0, zIndex: 45,
              background: "rgba(255,255,255,0.97)",
              display: "flex", flexDirection: "column",
              justifyContent: "center", alignItems: "center", gap: 28,
              animation: "fadeIn 0.2s"
            }}>
              {["Projects", "Studio", "Contact"].map(function(label) { return (
                <a key={label} href="#" onClick={function(e) { e.preventDefault(); setMenuOpen(false); onNav(label.toLowerCase()); }}
                  style={{
                    fontFamily: "var(--sans)", fontSize: 36, fontWeight: 400,
                    letterSpacing: "-0.02em", color: "var(--fg)", textDecoration: "none"
                  }}>
                  {label}
                </a>
              ); })}
            </div>
          )}
        </>
      );
    }

    function NavLink({ label, active, onClick }) {
      const [hover, setHover] = useState(false);
      return (
        <a href="#" onClick={function(e) { e.preventDefault(); onClick && onClick(); }}
          onMouseEnter={function() { setHover(true); }} onMouseLeave={function() { setHover(false); }}
          style={{
            color: active || hover ? "var(--fg)" : "var(--fg-dim)",
            textDecoration: "none", position: "relative", display: "inline-block",
            transition: "color 0.2s"
          }}>
          {label}
          {active && <span style={{ position: "absolute", left: 0, right: 0, bottom: -6, height: 1, background: "var(--fg)" }}/>}
        </a>
      );
    }

    /* ===================== STUDIO PAGE ===================== */
    function StudioPage() {
      const mobile = isMobile();
      return (
        <div style={{
          position: "fixed", inset: 0, background: "var(--bg)", overflow: "auto", zIndex: 5,
          animation: "fadeIn 0.5s", WebkitOverflowScrolling: "touch"
        }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "120px 20px 80px" : "180px 40px 120px" }}>
            <div style={{
              fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
              color: "var(--fg-dim)", marginBottom: 28, fontWeight: 400
            }}>Studio — Practice</div>
            <h1 style={{
              fontFamily: "var(--sans)", fontWeight: 400,
              fontSize: mobile ? "clamp(32px, 10vw, 48px)" : "clamp(48px, 6.5vw, 112px)",
              lineHeight: 0.95,
              letterSpacing: "-0.035em", margin: 0, color: "var(--fg)", maxWidth: "14ch"
            }}>Identity, made clear.</h1>
            <div style={{
              marginTop: mobile ? 56 : 96,
              display: "grid",
              gridTemplateColumns: mobile ? "1fr" : "1fr 2fr",
              gap: mobile ? 32 : 80,
              alignItems: "start"
            }}>
              <div style={{
                fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
                color: "var(--fg-dim)", fontWeight: 400, lineHeight: 2
              }}>
                <div>On the studio</div>
                <div style={{ color: "var(--fg)" }}>2026</div>
              </div>
              <div style={{
                fontFamily: "var(--sans)",
                fontSize: mobile ? "clamp(18px, 5vw, 22px)" : "clamp(20px, 2vw, 26px)",
                lineHeight: 1.45, letterSpacing: "-0.01em", color: "var(--fg)",
                textWrap: "pretty", maxWidth: "58ch"
              }}>
                <p style={{ margin: 0 }}>
                  At Vector Studio, our work is about identity. In a world overloaded with noise, we uncover what makes a brand singular and bring its essence into focus, showing the world not just what it is, but what it stands for.
                </p>
                <p style={{ marginTop: "1.4em" }}>
                  The mediums we use — CGI, branding, 3D or digital experiences — are gateways, not the goal. True impact comes from direction with magnitude: we position brands precisely, giving them the clarity, the force, and the presence to be noticed, understood, and remembered.
                </p>
              </div>
            </div>

            <div style={{
              marginTop: mobile ? 80 : 140,
              display: "grid",
              gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)",
              gap: mobile ? 24 : 32,
              borderTop: "1px solid var(--line)", paddingTop: mobile ? 28 : 40
            }}>
              {[
                ["Identity", "Marks, systems, voice."],
                ["Digital", "Sites, products, motion."],
                ["CGI & 3D", "Rendered worlds as proof."],
                ["Art direction", "From first sketch to final frame."]
              ].map(function(item) { return (
                <div key={item[0]}>
                  <div style={{
                    fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
                    color: "var(--fg-dim)", marginBottom: 10, fontWeight: 400
                  }}>{item[0]}</div>
                  <div style={{
                    fontFamily: "var(--sans)", fontSize: mobile ? 15 : 18, lineHeight: 1.35,
                    letterSpacing: "-0.01em", color: "var(--fg)"
                  }}>{item[1]}</div>
                </div>
              ); })}
            </div>
          </div>
        </div>
      );
    }

    /* ===================== CONTACT PAGE ===================== */
    function ContactPage() {
      const mobile = isMobile();
      return (
        <div style={{
          position: "fixed", inset: 0, background: "var(--bg)", overflow: "auto", zIndex: 5,
          animation: "fadeIn 0.5s", WebkitOverflowScrolling: "touch"
        }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "120px 20px 80px" : "180px 40px 120px" }}>
            <div style={{
              fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
              color: "var(--fg-dim)", marginBottom: 28, fontWeight: 400
            }}>Contact — Get in touch</div>
            <h1 style={{
              fontFamily: "var(--sans)", fontWeight: 400,
              fontSize: mobile ? "clamp(32px, 10vw, 48px)" : "clamp(48px, 6.5vw, 112px)",
              lineHeight: 0.95,
              letterSpacing: "-0.035em", margin: 0, color: "var(--fg)", maxWidth: "14ch"
            }}>Let's make something singular.</h1>

            <div style={{
              marginTop: mobile ? 56 : 96,
              display: "grid",
              gridTemplateColumns: mobile ? "1fr" : "1fr 1fr",
              gap: mobile ? 48 : 64,
              borderTop: "1px solid var(--line)", paddingTop: mobile ? 32 : 48
            }}>
              <div>
                <div style={{
                  fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
                  color: "var(--fg-dim)", marginBottom: 18, fontWeight: 400
                }}>Email</div>
                <a href="mailto:hello@vectorstudio.global" style={{
                  fontFamily: "var(--sans)",
                  fontSize: mobile ? "clamp(20px, 6vw, 28px)" : "clamp(28px, 3.4vw, 48px)",
                  letterSpacing: "-0.02em", color: "var(--fg)", textDecoration: "none",
                  borderBottom: "1px solid transparent", transition: "border-color 0.2s",
                  wordBreak: "break-all"
                }} onMouseEnter={function(e) { e.currentTarget.style.borderColor = "var(--fg)"; }}
                   onMouseLeave={function(e) { e.currentTarget.style.borderColor = "transparent"; }}>
                  hello@vectorstudio.global
                </a>
              </div>
              <div>
                <div style={{
                  fontFamily: "var(--sans)", fontSize: 12, letterSpacing: "0.02em",
                  color: "var(--fg-dim)", marginBottom: 18, fontWeight: 400
                }}>Instagram</div>
                <a href="https://instagram.com/vector___studio" target="_blank" rel="noreferrer" style={{
                  fontFamily: "var(--sans)",
                  fontSize: mobile ? "clamp(20px, 6vw, 28px)" : "clamp(28px, 3.4vw, 48px)",
                  letterSpacing: "-0.02em", color: "var(--fg)", textDecoration: "none",
                  borderBottom: "1px solid transparent", transition: "border-color 0.2s"
                }} onMouseEnter={function(e) { e.currentTarget.style.borderColor = "var(--fg)"; }}
                   onMouseLeave={function(e) { e.currentTarget.style.borderColor = "transparent"; }}>
                  @vector___studio
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ===================== INTRO ===================== */
    function IntroOverlay({ onDone }) {
      const [pct, setPct] = useState(0);
      const [hidden, setHidden] = useState(false);
      useEffect(() => {
        var p = 0;
        var id = setInterval(function() {
          p += Math.max(1, Math.round(Math.random() * 9));
          if (p >= 100) { p = 100; clearInterval(id); setTimeout(function() { setHidden(true); onDone && onDone(); }, 450); }
          setPct(p);
        }, 70);
        return () => clearInterval(id);
      }, []);
      return (
        <div style={{
          position: "fixed", inset: 0, zIndex: 100, background: "var(--bg)",
          display: "grid", placeItems: "center",
          transition: "opacity 0.7s, transform 0.9s cubic-bezier(.6,.02,.2,1)",
          opacity: hidden ? 0 : 1, transform: hidden ? "translateY(-100%)" : "translateY(0)",
          pointerEvents: hidden ? "none" : "auto"
        }}>
          <div style={{ textAlign: "center", color: "var(--fg)", padding: "0 20px" }}>
            <div style={{
              fontFamily: "var(--sans)", fontSize: 11, letterSpacing: "0.02em",
              color: "var(--fg-dim)", marginBottom: 28, fontWeight: 400
            }}>
              Vector Studio — A studio for moving pictures,<br/>surfaces and systems.
            </div>
            <div style={{
              fontFamily: "var(--sans)", fontWeight: 300,
              fontSize: "clamp(80px, 14vw, 220px)", lineHeight: 0.85, letterSpacing: "-0.05em"
            }}>
              {String(pct).padStart(3, "0")}
            </div>
            <div style={{ marginTop: 36, width: "min(420px, 60vw)", height: 1, background: "var(--line)", position: "relative", margin: "36px auto 0" }}>
              <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: pct + "%", background: "var(--fg)", transition: "width 0.15s linear" }}/>
            </div>
            <div style={{
              marginTop: 16, fontFamily: "var(--sans)", fontSize: 11, letterSpacing: "0.02em",
              color: "var(--fg-dim)", fontWeight: 400
            }}>Loading · 10 projects · 2026</div>
          </div>
        </div>
      );
    }

    /* ===================== APP ===================== */
    function App() {
      const [active, setActive] = useState(null);
      const [introDone, setIntroDone] = useState(false);
      const [page, setPage] = useState("projects");

      var handleEnter = function(project) { setPage("projects"); setActive(project); };
      var handleBack = function() { setActive(null); };
      var handleNext = function(next) { setActive(null); setTimeout(function() { setActive(next); }, 300); };
      var handleNav = function(p) { setActive(null); setPage(p); };

      return (
        <>
          {!introDone && <IntroOverlay onDone={function() { setIntroDone(true); }} />}
          {!active && <Nav onNav={handleNav} page={page} />}
          {page === "projects" && !active && <Gallery projects={window.PROJECTS} onEnter={handleEnter} />}
          {page === "studio" && !active && <StudioPage />}
          {page === "contact" && !active && <ContactPage />}
          {active && (
            <ProjectDetail
              key={active.id}
              project={active}
              allProjects={window.PROJECTS}
              onBack={handleBack}
              onNext={handleNext}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
