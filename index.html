<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vector Studio</title>
<meta name="description" content="Vector Studio - An artist-led studio working in subtraction. Identity, film, and platforms for category-defining companies." />
<meta property="og:title" content="Vector Studio" />
<meta property="og:description" content="An artist-led studio working in subtraction. Identity, film, and platforms for category-defining companies." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://14rd.com" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%231d2029'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --fg: #1d2029;
    --fg-mid: #49505d;
    --fg-dim: #8a8f9a;
    --line: rgba(29,32,41,0.1);
    --sans: "Inter", "Inter Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: var(--sans); overflow: hidden; height: 100%;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "cv11", "ss01";
  }
  *::selection { background: var(--fg); color: var(--bg); }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .smooth-scroll::-webkit-scrollbar { width: 0; }
  .smooth-scroll { scrollbar-width: none; }

  button:focus-visible, a:focus-visible { outline: 1px solid var(--fg); outline-offset: 2px; }

  .gallery-card {
    will-change: transform, opacity;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  /* Pill label component */
  .pill-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    color: var(--fg); letter-spacing: -0.01em;
    padding: 6px 14px 6px 12px;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg);
  }
  .pill-label::before {
    content: ""; display: block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--fg);
  }

  /* Blur edge overlays */
  .blur-top, .blur-bottom {
    position: fixed; left: 0; right: 0; z-index: 40;
    pointer-events: none;
  }
  .blur-top {
    top: 0; height: 120px;
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    -webkit-mask-image: linear-gradient(180deg, black 0%, black 40%, transparent 100%);
    mask-image: linear-gradient(180deg, black 0%, black 40%, transparent 100%);
  }
  .blur-bottom {
    bottom: 0; height: 100px;
    background: linear-gradient(0deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    -webkit-mask-image: linear-gradient(0deg, black 0%, black 40%, transparent 100%);
    mask-image: linear-gradient(0deg, black 0%, black 40%, transparent 100%);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>
  var PROJECTS = [
    { id: "01", slug: "ai-systems",             title: "AI Systems",            subtitle: "Manchester Airport Hotels - The future of hospitality, on film.",   client: "MA Hotels",             year: "2025", role: "Creative Direction, Design, CGI", discipline: "CGI",      cover: "assets/covers/MAHOTELS.png",            blurb: "A cinematic film on how AI and robotics could shape luxury hospitality. The idea is subtractive: the most advanced service is the one the guest never sees. Autonomous systems disappear into the experience and leave only ease." },
    { id: "02", slug: "demone-della-velocita",  title: "Demone Della Velocità", subtitle: "Dainese - A narrative in material, light, and form.", client: "Dainese",               year: "2025", role: "Creative Direction, CGI",          discipline: "CGI",      cover: "assets/covers/DAINESE.png",             blurb: "A film built from three elements and nothing else: material, light, and form. We stripped the brand back to the engineering and let the object carry it. Directed, animated, and visualised with precision, it expresses Dainese without a word of copy." },
    { id: "03", slug: "lk001",                  title: "LK001",                 subtitle: "Loho Kur - A collection reduced to a code.",                    client: "Loho Kur",              year: "2026", role: "Creative Direction, CGI",          discipline: "CGI",      cover: "assets/covers/LK001.png",               blurb: "We launched a new collection and direction through cinematic animation built around a single device, a collection code system. One idea, carried across the work, ordering the line down to its essentials." },
    { id: "04", slug: "erosion",                title: "Erosion",               subtitle: "James Jefferys x Zellerfeld - Footwear shaped by removal.", client: "Zellerfeld",            year: "2025", role: "Creative Direction, Design, CGI", discipline: "CGI",      cover: "assets/covers/EROSION.png",             blurb: "A sculptural shoe made by subtraction. The form follows geological erosion, where material is taken away until only the load-bearing structure remains. Designed, animated, and produced as a single digital-to-physical object." },
    { id: "05", slug: "akan-chief-glasses",     title: "Akan Chief Glasses",    subtitle: "Vic Mensa - Heritage in a single object.",                   client: "Vic Mensa",             year: "2025", role: "Creative Direction, Design, CGI", discipline: "Design",   cover: "assets/covers/VICMENSA.png",            blurb: "A one-of-one pair of gold Akan Chief glasses, modelled precisely to Vic Mensa's head. We distilled Akan heritage into a single sculptural form. A whole lineage, carried in one object made for one person." },
    { id: "06", slug: "diamond-grill-auction",  title: "Diamond Grill Auction", subtitle: "Sotheby's x Ian Delucca - An object sold before it existed.",     client: "Sotheby's",             year: "2024", role: "CGI",                              discipline: "CGI",      cover: "assets/covers/SOTHEBYS.png",            blurb: "We visualised a bespoke diamond grill before it was made, compressing the piece into a precise digital asset accurate enough to be valued and sold. The object existed as information first. That alone anchored a sale estimated at 3 to 5 million dollars." },
    { id: "07", slug: "piza",                   title: "Piza",                  subtitle: "Stephanie Piza - A brand reduced to its structure.",              client: "Piza",                  year: "2025", role: "Creative Direction, Brand Identity", discipline: "Identity", cover: "assets/covers/PIZA.png",                blurb: "A full brand identity built as one structure: strategy, typography, and visual system holding to a single idea. Nothing decorative survives. It reads as clarity and command from launch." },
    { id: "08", slug: "14-red-door",            title: "14 Red Door",           subtitle: "14 Red Door - An identity built in negative space.",                 client: "14 Red Door",           year: "2025", role: "Creative Direction, Brand Identity", discipline: "Identity", cover: "assets/covers/14REDDOOR.png",           blurb: "The complete identity, from name to type, drawn from a half-remembered childhood home. It centres on one image, a door between the known and the unknown. The brand works in negative space, on the idea that what matters most sits just out of view." },
    { id: "09", slug: "setting-sun",            title: "Setting Sun",           subtitle: "Hikari no Yami - One system, carried across a campaign.",              client: "Hikari no Yami",        year: "2025", role: "Creative Direction",               discipline: "Direction",cover: "assets/covers/SETTINGSUN.png",          blurb: "We directed Chapter 8 through a single refined identity system. One set of rules, applied without deviation, holding continuity across the campaign and sharpening the brand against everything around it." },
    { id: "10", slug: "studio-james-jefferys",  title: "Studio James Jefferys", subtitle: "James Jefferys - Subtraction as interface.",              client: "Studio James Jefferys", year: "2026", role: "Creative Direction, Web Design",   discipline: "Web",      cover: "assets/covers/STUDIOJAMESJEFFERYS.png", blurb: "A single-surface website built as one digital skin. The premise: the most intuitive interface is the human body, so interaction is reduced to its essential elements and nothing more. The method is subtraction, used for clarity and control." }
  ];
  function coverBg(project) {
    return "#f2efe9 url(\"" + project.cover + "\") center/cover no-repeat";
  }
  window.PROJECTS = PROJECTS;
  window.coverBg = coverBg;

  function getInitialRoute() {
    var params = new URLSearchParams(window.location.search);
    var redirected = params.get("route");
    if (redirected) { history.replaceState(null, "", redirected); return redirected; }
    return window.location.pathname;
  }
  window._initialRoute = getInitialRoute();
  </script>

  <script type="text/babel">
    const { useEffect, useRef, useState, useCallback } = React;
    function isMobile() { return window.innerWidth <= 768; }

    /* ===================== SMOOTH SCROLL ===================== */
    function SmoothScroll({ children, scrollKey }) {
      var containerRef = useRef(null);
      var contentRef = useRef(null);
      var scrollTarget = useRef(0);
      var scrollCurrent = useRef(0);
      var rafId = useRef(null);

      useEffect(function() {
        var container = containerRef.current;
        var content = contentRef.current;
        if (!container || !content) return;
        scrollTarget.current = 0; scrollCurrent.current = 0;

        var maxScroll = function() { return Math.max(0, content.scrollHeight - container.clientHeight); };
        var onWheel = function(e) {
          e.preventDefault();
          scrollTarget.current = Math.max(0, Math.min(maxScroll(), scrollTarget.current + e.deltaY));
        };
        var touchLastY = 0, velocity = 0;
        var onTouchStart = function(e) { touchLastY = e.touches[0].clientY; velocity = 0; };
        var onTouchMove = function(e) {
          e.preventDefault();
          var y = e.touches[0].clientY; var dy = touchLastY - y; velocity = dy; touchLastY = y;
          scrollTarget.current = Math.max(0, Math.min(maxScroll(), scrollTarget.current + dy));
        };
        var onTouchEnd = function() {
          scrollTarget.current = Math.max(0, Math.min(maxScroll(), scrollTarget.current + velocity * 8));
        };

        container.addEventListener("wheel", onWheel, { passive: false });
        container.addEventListener("touchstart", onTouchStart, { passive: true });
        container.addEventListener("touchmove", onTouchMove, { passive: false });
        container.addEventListener("touchend", onTouchEnd, { passive: true });

        var tick = function() {
          var delta = scrollTarget.current - scrollCurrent.current;
          scrollCurrent.current += delta * 0.08;
          if (Math.abs(delta) < 0.5) scrollCurrent.current = scrollTarget.current;
          content.style.transform = "translate3d(0, " + (-scrollCurrent.current) + "px, 0)";
          rafId.current = requestAnimationFrame(tick);
        };
        rafId.current = requestAnimationFrame(tick);

        return function() {
          cancelAnimationFrame(rafId.current);
          container.removeEventListener("wheel", onWheel);
          container.removeEventListener("touchstart", onTouchStart);
          container.removeEventListener("touchmove", onTouchMove);
          container.removeEventListener("touchend", onTouchEnd);
        };
      }, [scrollKey]);

      useEffect(function() {
        scrollTarget.current = 0; scrollCurrent.current = 0;
        if (contentRef.current) contentRef.current.style.transform = "translate3d(0, 0, 0)";
      }, [scrollKey]);

      return (
        <div ref={containerRef} style={{ position: "fixed", inset: 0, overflow: "hidden", background: "var(--bg)", zIndex: 5 }}>
          <div className="blur-top" />
          <div className="blur-bottom" />
          <div ref={contentRef} style={{ willChange: "transform", WebkitBackfaceVisibility: "hidden" }}>{children}</div>
        </div>
      );
    }

    /* ===================== ROUTING ===================== */
    function navigate(path) { history.pushState(null, "", path); window.dispatchEvent(new Event("popstate")); }
    function parseRoute(path) {
      var p = path.replace(/\/+$/, "") || "/";
      if (p === "/" || p === "/projects") return { page: "projects", slug: null };
      if (p === "/studio") return { page: "studio", slug: null };
      if (p === "/contact") return { page: "contact", slug: null };
      var slug = p.replace(/^\//, "");
      var proj = window.PROJECTS.find(function(pr) { return pr.slug === slug; });
      if (proj) return { page: "project", slug: slug };
      return { page: "projects", slug: null };
    }
    function useRoute() {
      var st = useState(parseRoute(window._initialRoute || "/"));
      useEffect(function() {
        var onPop = function() { st[1](parseRoute(window.location.pathname)); };
        window.addEventListener("popstate", onPop);
        return function() { window.removeEventListener("popstate", onPop); };
      }, []);
      return st[0];
    }

    /* ===================== GALLERY ===================== */
    function Gallery({ projects, onEnter }) {
      var n = projects.length;
      var stH = useState(null); var hoverIdx = stH[0], setHoverIdx = stH[1];
      var stE = useState(null); var entering = stE[0], setEntering = stE[1];
      var progressRef = useRef(0), targetRef = useRef(0), velocityRef = useRef(0);
      var mouseRef = useRef({ x: 0.5, y: 0.5 }), hoverRef = useRef(null);
      var rafRef = useRef(null), stageRef = useRef(null), wrapperRef = useRef(null);
      var cardRefs = useRef([]), bannerTitleRef = useRef(null), bannerSubRef = useRef(null), lastBannerIdx = useRef(-1);
      var mobile = isMobile();
      var cardW = mobile ? 280 : 520, cardH = mobile ? 183 : 340, spreadX = mobile ? 200 : 360;

      useEffect(function() { hoverRef.current = hoverIdx; }, [hoverIdx]);

      useEffect(function() {
        if (entering) return;
        var last = performance.now();
        var tick = function(t) {
          var dt = Math.min(64, t - last); last = t;
          if (!mobile && hoverRef.current == null) {
            var mx = mouseRef.current.x, dx = mx - 0.5;
            var sign = dx > 0 ? 1 : (dx < 0 ? -1 : 0);
            var mag = Math.max(0, Math.abs(dx) - 0.28);
            if (mag > 0) targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + sign * mag * mag * 3.0 * (dt / 1000)));
          }
          if (Math.abs(velocityRef.current) > 0.0001) {
            targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + velocityRef.current));
            velocityRef.current *= 0.94;
          }
          var delta = targetRef.current - progressRef.current;
          progressRef.current += Math.abs(delta) > 0.0005 ? delta * 0.09 : (progressRef.current = targetRef.current, 0);
          var progress = progressRef.current;

          if (!mobile && wrapperRef.current) {
            var mx2 = mouseRef.current.x, my2 = mouseRef.current.y;
            wrapperRef.current.style.transform = "translate3d(" + ((mx2-0.5)*28) + "px," + ((my2-0.5)*18) + "px,0) rotateX(" + (-(my2-0.5)*8) + "deg) rotateY(" + ((mx2-0.5)*12) + "deg)";
          }

          var activeIdx = hoverRef.current != null ? hoverRef.current : Math.max(0, Math.min(n-1, Math.round(progress)));
          for (var i = 0; i < n; i++) {
            var el = cardRefs.current[i]; if (!el) continue;
            var o = i - progress;
            el.style.transform = "translate3d(calc(-50% + " + (o*spreadX) + "px),calc(-50% + " + (((((i%n)+n)%n)*53)%130-65+o*6) + "px)," + (-Math.abs(o)*(mobile?150:220)) + "px) rotate(" + (Math.sin(i*1.3)*3.2) + "deg)";
            el.style.opacity = Math.abs(o) > 5 ? 0 : 1;
            var baseZ = 1000 - Math.abs(Math.round(o*10));
            var proxZ = Math.round(500 - Math.abs(0.5+(i-progress)*0.18-mouseRef.current.x)*1000);
            el.style.zIndex = hoverRef.current === i ? 3000 : proxZ + baseZ;
          }

          if (activeIdx !== lastBannerIdx.current) {
            lastBannerIdx.current = activeIdx;
            var proj = projects[activeIdx];
            if (bannerSubRef.current) bannerSubRef.current.textContent = proj.subtitle || proj.client;
            if (bannerTitleRef.current) {
              bannerTitleRef.current.textContent = proj.title;
              bannerTitleRef.current.style.animation = "none"; bannerTitleRef.current.offsetHeight;
              bannerTitleRef.current.style.animation = "rise 0.55s cubic-bezier(.2,.7,.2,1)";
            }
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return function() { cancelAnimationFrame(rafRef.current); };
      }, [entering, n, mobile, spreadX, projects]);

      useEffect(function() {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var onWheel = function(e) { e.preventDefault(); targetRef.current = Math.max(0, Math.min(n-1, targetRef.current + (e.deltaY+e.deltaX)*0.0025)); };
        el.addEventListener("wheel", onWheel, { passive: false });
        return function() { el.removeEventListener("wheel", onWheel); };
      }, [entering, n]);

      useEffect(function() {
        if (entering) return;
        var onKey = function(e) {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") targetRef.current = Math.min(n-1, Math.round(targetRef.current)+1);
          else if (e.key === "ArrowLeft" || e.key === "ArrowUp") targetRef.current = Math.max(0, Math.round(targetRef.current)-1);
          else if (e.key === "Enter") onEnter(projects[Math.max(0, Math.min(n-1, Math.round(progressRef.current)))]);
        };
        window.addEventListener("keydown", onKey);
        return function() { window.removeEventListener("keydown", onKey); };
      }, [entering, onEnter, projects, n]);

      useEffect(function() {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var startX = 0, startProg = 0, dragging = false, lastX = 0, lastT = 0;
        var onDown = function(e) { dragging = true; velocityRef.current = 0;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          startX = cx; lastX = cx; lastT = performance.now(); startProg = targetRef.current; };
        var onMove = function(e) { if (!dragging) return;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          targetRef.current = Math.max(0, Math.min(n-1, startProg + (startX-cx)*0.012)); lastX = cx; lastT = performance.now(); };
        var onUp = function(e) { if (!dragging) return; dragging = false;
          var cx = e.clientX != null ? e.clientX : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : lastX);
          var dt = performance.now() - lastT;
          if (dt > 0 && dt < 100) velocityRef.current = (lastX - cx) / dt * 0.3; };
        el.addEventListener("mousedown", onDown); window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
        el.addEventListener("touchstart", onDown, { passive: true }); window.addEventListener("touchmove", onMove, { passive: true }); window.addEventListener("touchend", onUp, { passive: true });
        return function() { el.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
          el.removeEventListener("touchstart", onDown); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onUp); };
      }, [entering, n]);

      useEffect(function() {
        var el = stageRef.current; if (!el) return;
        var onMove = function(e) { var r = el.getBoundingClientRect(); mouseRef.current = { x: (e.clientX-r.left)/r.width, y: (e.clientY-r.top)/r.height }; };
        el.addEventListener("mousemove", onMove);
        return function() { el.removeEventListener("mousemove", onMove); };
      }, []);

      var handleEnter = function(project) { setEntering(project); setTimeout(function() { onEnter(project); }, 900); };

      return (
        <div ref={stageRef} style={{ position: "fixed", inset: 0, background: "var(--bg)",
          perspective: mobile ? "1200px" : "1800px", perspectiveOrigin: "50% 50%",
          overflow: "hidden", userSelect: "none", touchAction: "none" }}>
          <div ref={wrapperRef} style={{ position: "absolute", inset: 0,
            WebkitTransformStyle: "preserve-3d", transformStyle: "preserve-3d",
            transition: mobile ? "none" : "transform 0.5s cubic-bezier(.2,.7,.2,1)", pointerEvents: "none" }}>
            {projects.map(function(p, i) {
              var isEntering = entering && entering.id === p.id;
              var enterStyle = isEntering ? { transform: "translate3d(-50%,-50%,500px) scale(2)", opacity: 0,
                transition: "transform 0.9s cubic-bezier(.6,.02,.2,1), opacity 0.9s" }
                : entering ? { opacity: 0, transition: "opacity 0.35s" } : {};
              return (
                <div key={p.id} ref={function(el) { cardRefs.current[i] = el; }} className="gallery-card"
                  onMouseEnter={function() { setHoverIdx(i); }}
                  onMouseLeave={function() { setHoverIdx(function(c) { return c === i ? null : c; }); }}
                  onClick={function() { handleEnter(p); }}
                  style={{ position: "absolute", left: "50%", top: "50%", width: cardW, height: cardH,
                    pointerEvents: "auto", cursor: "pointer", zIndex: isEntering ? 9999 : 1000, ...enterStyle }}>
                  <div style={{ position: "relative", width: "100%", height: "100%",
                    transform: hoverIdx === i ? "scale(1.02)" : "scale(1)", transition: "transform 0.4s" }}>
                    <img src={p.cover} alt={p.title} draggable="false" style={{
                      position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "contain",
                      transform: "translateZ(0)", userSelect: "none", WebkitUserDrag: "none", WebkitBackfaceVisibility: "hidden" }} />
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ position: "absolute", left: "50%", top: mobile ? "auto" : 96, bottom: mobile ? 48 : "auto",
            transform: "translateX(-50%)", textAlign: "center", opacity: entering ? 0 : 1, transition: "opacity 0.4s",
            pointerEvents: "none", maxWidth: "90vw", width: "100%", padding: "0 16px" }}>
            <div ref={bannerSubRef} style={{ fontSize: mobile ? 12 : 13, letterSpacing: "-0.01em",
              color: "var(--fg-mid)", marginBottom: mobile ? 10 : 14, fontWeight: 400 }}>{projects[0].subtitle}</div>
            <h1 ref={bannerTitleRef} style={{ fontWeight: 600,
              fontSize: mobile ? "clamp(28px, 8vw, 44px)" : "clamp(44px, 6vw, 80px)",
              lineHeight: 1.05, letterSpacing: "-0.04em", margin: 0, color: "var(--fg)",
              animation: "rise 0.55s cubic-bezier(.2,.7,.2,1)" }}>{projects[0].title}</h1>
          </div>
        </div>
      );
    }

    /* ===================== PROJECT DETAIL ===================== */
    function ProjectDetail({ project, allProjects, onBack, onNext }) {
      var stM = useState(false); var mounted = stM[0], setMounted = stM[1];
      var mobile = isMobile();
      useEffect(function() { var t = setTimeout(function() { setMounted(true); }, 30); return function() { clearTimeout(t); }; }, []);
      var nextIdx = (allProjects.findIndex(function(p) { return p.id === project.id; }) + 1) % allProjects.length;
      var next = allProjects[nextIdx];

      return (
        <SmoothScroll scrollKey={project.id}>
          <div style={{ opacity: mounted ? 1 : 0, transition: "opacity 0.5s", animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
            <section style={{ position: "relative", height: mobile ? "70vh" : "100vh", width: "100%", overflow: "hidden" }}>
              <img src={project.cover} alt={project.title} style={{
                position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "contain", background: "#f2efe9",
                transform: mounted ? "scale(1) translateZ(0)" : "scale(1.15) translateZ(0)",
                transition: "transform 1.6s cubic-bezier(.2,.7,.2,1)", WebkitBackfaceVisibility: "hidden" }} />
              <div style={{ position: "absolute", inset: 0,
                background: "linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.35) 100%)" }}/>
              <div style={{ position: "absolute", left: mobile ? 20 : 32, bottom: mobile ? 32 : 56, right: mobile ? 20 : 32,
                display: "flex", alignItems: mobile ? "flex-start" : "flex-end", justifyContent: "space-between",
                gap: mobile ? 24 : 48, flexDirection: mobile ? "column" : "row" }}>
                <div>
                  <div style={{ fontSize: mobile ? 12 : 14, letterSpacing: "-0.01em", color: "rgba(255,255,255,0.78)",
                    marginBottom: mobile ? 12 : 18, fontWeight: 500, textShadow: "0 1px 12px rgba(0,0,0,0.3)" }}>{project.subtitle}</div>
                  <h1 style={{ fontWeight: 600, fontSize: mobile ? "clamp(32px, 10vw, 56px)" : "clamp(56px, 9vw, 120px)",
                    lineHeight: 1.0, letterSpacing: "-0.04em", margin: 0, color: "#fff", maxWidth: "14ch",
                    textShadow: "0 2px 40px rgba(0,0,0,0.25)" }}>{project.title}</h1>
                </div>
                {!mobile && <div style={{ fontSize: 15, fontWeight: 400, color: "#fff", maxWidth: 300, textAlign: "right",
                  lineHeight: 1.5, textShadow: "0 1px 12px rgba(0,0,0,0.3)" }}>{project.blurb}</div>}
              </div>
            </section>

            <section style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "80px 20px 60px" : "140px 32px 80px",
              display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 2fr", gap: mobile ? 48 : 80 }}>
              <div style={mobile ? {} : { position: "sticky", top: 120, alignSelf: "start" }}>
                <MetaRow label="Client" value={project.client} />
                <MetaRow label="Year" value={project.year} />
                <MetaRow label="Role" value={project.role} />
                <MetaRow label="Discipline" value={project.discipline} />
              </div>
              <div>
                <p style={{ fontWeight: 500, fontSize: mobile ? "clamp(18px, 5vw, 22px)" : "clamp(22px, 2.2vw, 28px)",
                  lineHeight: 1.3, letterSpacing: "-0.02em", color: "var(--fg)", margin: 0 }}>{project.blurb}</p>
              </div>
            </section>

            <section style={{ padding: mobile ? "20px 20px 80px" : "40px 32px 120px", maxWidth: 1600, margin: "0 auto" }}>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "repeat(6, 1fr)",
                gap: mobile ? 12 : 16, gridAutoRows: "minmax(180px, auto)" }}>
                <Shot project={project} style={mobile ? { aspectRatio: "16/10" } : { gridColumn: "1/5", gridRow: "span 2", aspectRatio: "16/10" }}/>
                <Shot project={project} style={mobile ? { aspectRatio: "4/5" } : { gridColumn: "5/7", aspectRatio: "4/5" }}/>
                <Shot project={project} style={mobile ? { aspectRatio: "4/5" } : { gridColumn: "5/7", aspectRatio: "4/5" }}/>
                <Shot project={project} style={mobile ? { aspectRatio: "1/1" } : { gridColumn: "1/4", aspectRatio: "1/1" }}/>
                <Shot project={project} style={mobile ? { aspectRatio: "16/9" } : { gridColumn: "4/7", aspectRatio: "16/9" }}/>
              </div>
            </section>

            <section onClick={function() { onNext(next); }} style={{
              position: "relative", height: mobile ? "50vh" : "70vh", cursor: "pointer", overflow: "hidden",
              borderTop: "1px solid var(--line)" }}>
              <div style={{ position: "absolute", inset: 0, background: coverBg(next), filter: "brightness(0.85)" }}/>
              <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center", color: "#fff" }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, letterSpacing: "-0.01em", opacity: 0.85,
                    marginBottom: mobile ? 16 : 24, textShadow: "0 1px 12px rgba(0,0,0,0.3)" }}>Next project</div>
                  <div style={{ fontWeight: 600, fontSize: mobile ? "clamp(32px, 10vw, 56px)" : "clamp(56px, 8vw, 100px)",
                    lineHeight: 1.0, letterSpacing: "-0.04em", textShadow: "0 2px 40px rgba(0,0,0,0.25)" }}>{next.title}</div>
                </div>
              </div>
            </section>
          </div>

          <button onClick={onBack} style={{
            position: "fixed", right: mobile ? 16 : 32, top: mobile ? 16 : 32, zIndex: 60,
            background: "rgba(255,255,255,0.7)", backdropFilter: "blur(15px)", WebkitBackdropFilter: "blur(15px)",
            border: "1px solid var(--line)", color: "var(--fg)",
            fontSize: 13, fontWeight: 500, letterSpacing: "-0.01em",
            padding: mobile ? "10px 14px" : "12px 18px", cursor: "pointer", borderRadius: 999 }}>Back</button>
        </SmoothScroll>
      );
    }

    function MetaRow({ label, value }) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "90px 1fr", gap: 16,
          padding: "14px 0", borderTop: "1px solid var(--line)", fontSize: 13, fontWeight: 400 }}>
          <div style={{ color: "var(--fg-dim)" }}>{label}</div>
          <div style={{ color: "var(--fg)" }}>{value}</div>
        </div>
      );
    }

    function Shot({ project, style }) {
      return (
        <div style={{ position: "relative", overflow: "hidden", background: coverBg(project), outline: "1px solid var(--line)", borderRadius: 8, ...style }}>
          <div style={{ position: "absolute", inset: 0,
            background: "linear-gradient(120deg, rgba(255,255,255,0.08) 0%, transparent 40%, rgba(0,0,0,0.06) 100%)",
            mixBlendMode: "overlay" }}/>
        </div>
      );
    }

    /* ===================== NAV ===================== */
    function Nav({ onNav, page }) {
      var mobile = isMobile();
      var stMenu = useState(false); var menuOpen = stMenu[0], setMenuOpen = stMenu[1];
      return (
        <>
          <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
            padding: mobile ? "16px" : "12px 32px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            pointerEvents: "none",
            background: "linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 100%)",
            backdropFilter: "blur(15px)", WebkitBackdropFilter: "blur(15px)" }}>
            <a href="/" onClick={function(e) { e.preventDefault(); setMenuOpen(false); onNav("projects"); }} style={{
              display: "flex", alignItems: "center", gap: 8, pointerEvents: "auto", cursor: "pointer",
              textDecoration: "none", color: "var(--fg)" }}>
              <span style={{ display: "inline-block", width: 8, height: 8, background: "var(--fg)", borderRadius: "50%", flexShrink: 0 }}/>
              <div>
                <div style={{ fontWeight: 600, fontSize: mobile ? 14 : 15, letterSpacing: "-0.02em", lineHeight: 1.2 }}>Vector Studio</div>
                <div style={{ fontSize: mobile ? 10 : 11, letterSpacing: "-0.01em", color: "var(--fg-dim)", fontWeight: 400, marginTop: 1 }}>An artist-led studio working in subtraction.</div>
              </div>
            </a>
            {!mobile && (
              <div style={{ display: "flex", alignItems: "center", gap: 24, pointerEvents: "auto",
                fontSize: 14, fontWeight: 600, color: "var(--fg)" }}>
                <NavLink active={page === "projects"} label="Projects" onClick={function() { onNav("projects"); }} />
                <NavLink active={page === "studio"}   label="Studio"   onClick={function() { onNav("studio"); }} />
                <NavLink active={page === "contact"}  label="Contact"  onClick={function() { onNav("contact"); }} />
                <a href="https://portal.vectorstudio.global" target="_blank" rel="noreferrer" style={{
                  fontSize: 14, fontWeight: 600, color: "var(--fg-dim)", textDecoration: "none", transition: "color 0.2s"
                }} onMouseEnter={function(e) { e.currentTarget.style.color = "var(--fg)"; }}
                   onMouseLeave={function(e) { e.currentTarget.style.color = "var(--fg-dim)"; }}>Portal</a>
              </div>
            )}
            {mobile && (
              <button onClick={function() { setMenuOpen(!menuOpen); }} style={{
                background: "transparent", border: "1px solid var(--line)", color: "var(--fg)",
                fontSize: 13, fontWeight: 500, padding: "7px 14px", cursor: "pointer", borderRadius: 999,
                pointerEvents: "auto" }}>{menuOpen ? "Close" : "Menu"}</button>
            )}
          </nav>
          {mobile && menuOpen && (
            <div style={{ position: "fixed", inset: 0, zIndex: 45, background: "rgba(255,255,255,0.97)",
              backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
              display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 28,
              animation: "fadeIn 0.2s" }}>
              {["Projects", "Studio", "Contact"].map(function(label) { return (
                <a key={label} href={"/" + label.toLowerCase()} onClick={function(e) { e.preventDefault(); setMenuOpen(false); onNav(label.toLowerCase()); }}
                  style={{ fontSize: 36, fontWeight: 600, letterSpacing: "-0.03em", color: "var(--fg)", textDecoration: "none" }}>{label}</a>
              ); })}
              <div style={{ height: 1, background: "var(--line)", width: 60, margin: "4px 0" }} />
              <a href="https://portal.vectorstudio.global" target="_blank" rel="noreferrer"
                style={{ fontSize: 18, fontWeight: 500, color: "var(--fg-dim)", textDecoration: "none" }}>Portal</a>
            </div>
          )}
        </>
      );
    }

    function NavLink({ label, active, onClick }) {
      var st = useState(false); var hover = st[0], setHover = st[1];
      return (
        <a href={"/" + label.toLowerCase()} onClick={function(e) { e.preventDefault(); onClick && onClick(); }}
          onMouseEnter={function() { setHover(true); }} onMouseLeave={function() { setHover(false); }}
          style={{ color: active || hover ? "var(--fg)" : "var(--fg-dim)", textDecoration: active ? "underline" : "none",
            textUnderlineOffset: "4px", transition: "color 0.2s" }}>{label}</a>
      );
    }

    /* ===================== STUDIO PAGE ===================== */
    function StudioPage() {
      var mobile = isMobile();
      var bodyStyle = { fontSize: mobile ? 15 : 16, fontWeight: 400, lineHeight: 1.5, color: "var(--fg-mid)", maxWidth: "56ch" };

      return (
        <SmoothScroll scrollKey="studio">
          <div style={{ animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>

            {/* Hero section */}
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "120px 20px 60px" : "160px 40px 80px",
              display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: mobile ? 40 : 80, alignItems: "start" }}>
              <div>
                <div className="pill-label" style={{ marginBottom: mobile ? 24 : 32 }}>Studio</div>
                <h1 style={{ fontWeight: 600, fontSize: mobile ? "clamp(36px, 10vw, 56px)" : "clamp(48px, 5vw, 72px)",
                  lineHeight: 1.1, letterSpacing: "-0.04em", margin: 0, color: "var(--fg)", maxWidth: "14ch"
                }}>We find the brand by removing everything that isn't it.</h1>
                <p style={{ fontSize: mobile ? 18 : 22, fontWeight: 500, lineHeight: 1.35, letterSpacing: "-0.02em",
                  color: "var(--fg-mid)", marginTop: mobile ? 20 : 28, maxWidth: "36ch"
                }}>An artist-led studio. Identity, film, and platforms for category-defining companies.</p>
              </div>
            </div>

            {/* About */}
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "60px 20px" : "80px 40px" }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: mobile ? 40 : 56,
                display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 2fr", gap: mobile ? 24 : 80 }}>
                <div className="pill-label" style={{ alignSelf: "start" }}>About</div>
                <div style={bodyStyle}>
                  <p style={{ margin: 0 }}>Vector is an artist-led studio working in subtraction. We build brands, films, and platforms for category-defining companies by removing everything that is not essential. The method comes from the practice of our founder, James Jefferys, an artist who has worked in subtraction for years. The result is quieter, sharper, and harder to ignore.</p>
                </div>
              </div>
            </div>

            {/* The method */}
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "60px 20px" : "80px 40px" }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: mobile ? 40 : 56 }}>
                <div style={{ textAlign: "center", marginBottom: mobile ? 40 : 64 }}>
                  <div className="pill-label" style={{ margin: "0 auto 24px" }}>The method</div>
                  <h2 style={{ fontWeight: 600, fontSize: mobile ? "clamp(28px, 8vw, 40px)" : "clamp(36px, 4vw, 48px)",
                    lineHeight: 1.1, letterSpacing: "-0.03em", margin: 0, color: "var(--fg)", maxWidth: "18ch", marginLeft: "auto", marginRight: "auto"
                  }}>Subtraction in four principles.</h2>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: mobile ? 32 : 40 }}>
                  {[
                    ["Define by deletion.", "The brand is what remains when nothing else can be removed. We find it by taking away, not by adding on."],
                    ["One idea, carried fully.", "Most brands dilute across many messages and many marks. We choose the single idea that holds, and run it through every surface without compromise."],
                    ["Negative space does the work.", "What is left out defines what is there. Restraint creates the contrast that makes the essential read."],
                    ["Subtraction is judgment, not minimalism.", "This is not a style. It is the discipline of deciding what matters and cutting the rest, at every level. The judgment of what to remove is the work."]
                  ].map(function(item, i) { return (
                    <div key={i} style={{ background: "#f5f5f7", borderRadius: 12, padding: mobile ? "28px 24px" : "36px 32px" }}>
                      <div className="pill-label" style={{ marginBottom: 16, fontSize: 13 }}>Step {i + 1}</div>
                      <h3 style={{ fontWeight: 500, fontSize: mobile ? 22 : 26, lineHeight: 1.2, letterSpacing: "-0.02em",
                        color: "var(--fg)", margin: "0 0 12px" }}>{item[0]}</h3>
                      <p style={{ margin: 0, ...bodyStyle, color: "var(--fg-mid)" }}>{item[1]}</p>
                    </div>
                  ); })}
                </div>
              </div>
            </div>

            {/* What we do */}
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "60px 20px" : "80px 40px" }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: mobile ? 40 : 56 }}>
                <div className="pill-label" style={{ marginBottom: mobile ? 32 : 48 }}>What we do</div>
                <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "repeat(3, 1fr)", gap: mobile ? 36 : 48 }}>
                  {[
                    ["Identity", "Brand systems reduced to what is load-bearing. Name, mark, type, and the rules that hold them. Nothing decorative survives."],
                    ["Film and CGI", "Brand and fundraising films, 3D and CGI. One idea per film, told in the fewest beats that carry it."],
                    ["Platform", "Websites, product surfaces, and client platforms. Interfaces stripped to the path that matters."]
                  ].map(function(item) { return (
                    <div key={item[0]}>
                      <h3 style={{ fontWeight: 500, fontSize: mobile ? 22 : 26, lineHeight: 1.2, letterSpacing: "-0.02em",
                        color: "var(--fg)", margin: "0 0 12px" }}>{item[0]}</h3>
                      <p style={{ margin: 0, ...bodyStyle }}>{item[1]}</p>
                    </div>
                  ); })}
                </div>
              </div>
            </div>

            {/* Who it's for + Who we are */}
            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "60px 20px" : "80px 40px" }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: mobile ? 40 : 56,
                display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 2fr", gap: mobile ? 24 : 80 }}>
                <div className="pill-label" style={{ alignSelf: "start" }}>Who it's for</div>
                <div style={bodyStyle}>
                  <p style={{ margin: 0 }}>We work with founders building something category-defining. Frontier companies in materials, hardware, and deep tech. Premium brands in luxury, lifestyle, and wealth. The common thread is a brand that should say less and mean more.</p>
                </div>
              </div>
            </div>

            <div style={{ maxWidth: 1200, margin: "0 auto", padding: mobile ? "60px 20px 120px" : "80px 40px 160px" }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: mobile ? 40 : 56,
                display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 2fr", gap: mobile ? 24 : 80 }}>
                <div className="pill-label" style={{ alignSelf: "start" }}>Who we are</div>
                <div style={bodyStyle}>
                  <p style={{ margin: 0 }}>Vector is led by James Jefferys, Principal and Creative Director, and an artist. The studio's method comes directly from his own work, including a three-year subtractive chess project. He brings that discipline to every commission.</p>
                  <p style={{ marginTop: "1.2em" }}>Gabor Homoky, Studio Director. Jan Aguirre, Senior Designer. Winston Ferguson, Development Director.</p>
                  <p style={{ marginTop: "1.2em", color: "var(--fg-dim)" }}>We take on a small number of engagements each year.</p>
                </div>
              </div>
            </div>

          </div>
        </SmoothScroll>
      );
    }

    /* ===================== CONTACT PAGE ===================== */
    function ContactPage() {
      var mobile = isMobile();
      return (
        <div style={{ position: "fixed", inset: 0, background: "var(--bg)", zIndex: 5,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
          <div style={{ maxWidth: 1200, width: "100%", padding: mobile ? "0 20px" : "0 40px" }}>
            <div className="pill-label" style={{ marginBottom: mobile ? 28 : 40 }}>Contact</div>
            <div style={{ fontSize: mobile ? 20 : 26, fontWeight: 500, lineHeight: 1.35, letterSpacing: "-0.02em",
              color: "var(--fg)", maxWidth: "36ch" }}>
              <p style={{ margin: 0 }}>For new work, write to{" "}
                <a href="mailto:hello@vectorstudio.global" style={{
                  color: "var(--fg)", textDecoration: "underline", textUnderlineOffset: "3px",
                  textDecorationColor: "var(--line)", transition: "text-decoration-color 0.2s"
                }} onMouseEnter={function(e) { e.currentTarget.style.textDecorationColor = "var(--fg)"; }}
                   onMouseLeave={function(e) { e.currentTarget.style.textDecorationColor = "var(--line)"; }}>hello@vectorstudio.global</a></p>
              <p style={{ marginTop: "1.4em", fontSize: mobile ? 15 : 16, fontWeight: 400, color: "var(--fg-dim)", lineHeight: 1.5 }}>
                We take on a small number of engagements each year and reply to enquiries that are a fit.</p>
            </div>
          </div>
        </div>
      );
    }

    /* ===================== INTRO ===================== */
    function IntroOverlay({ onDone }) {
      var stP = useState(0); var pct = stP[0], setPct = stP[1];
      var stH = useState(false); var hidden = stH[0], setHidden = stH[1];
      useEffect(function() {
        var p = 0;
        var id = setInterval(function() {
          p += Math.max(1, Math.round(Math.random() * 9));
          if (p >= 100) { p = 100; clearInterval(id); setTimeout(function() { setHidden(true); onDone && onDone(); }, 450); }
          setPct(p);
        }, 70);
        return function() { clearInterval(id); };
      }, []);
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "var(--bg)",
          display: "grid", placeItems: "center",
          transition: "opacity 0.7s, transform 0.9s cubic-bezier(.6,.02,.2,1)",
          opacity: hidden ? 0 : 1, transform: hidden ? "translateY(-100%)" : "translateY(0)",
          pointerEvents: hidden ? "none" : "auto" }}>
          <div style={{ textAlign: "center", color: "var(--fg)", padding: "0 20px" }}>
            <div style={{ fontSize: 13, fontWeight: 500, letterSpacing: "-0.01em",
              color: "var(--fg-dim)", marginBottom: 28 }}>Vector Studio - An artist-led studio working in subtraction.</div>
            <div style={{ fontWeight: 600, fontSize: "clamp(80px, 14vw, 200px)", lineHeight: 0.85, letterSpacing: "-0.05em" }}>{String(pct).padStart(3, "0")}</div>
            <div style={{ marginTop: 36, width: "min(420px, 60vw)", height: 1, background: "var(--line)", position: "relative", margin: "36px auto 0" }}>
              <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: pct + "%", background: "var(--fg)", transition: "width 0.15s linear" }}/>
            </div>
            <div style={{ marginTop: 16, fontSize: 13, fontWeight: 400, letterSpacing: "-0.01em", color: "var(--fg-dim)" }}>Loading - 10 projects - 2026</div>
          </div>
        </div>
      );
    }

    /* ===================== APP ===================== */
    function App() {
      var route = useRoute();
      var stI = useState(false); var introDone = stI[0], setIntroDone = stI[1];

      useEffect(function() {
        if (route.page !== "projects" || route.slug) setIntroDone(true);
      }, []);

      var handleEnter = function(project) { navigate("/" + project.slug); };
      var handleBack = function() { navigate("/projects"); };
      var handleNext = function(next) { navigate("/" + next.slug); };
      var handleNav = function(p) { navigate("/" + p); };

      var activeProject = route.slug ? window.PROJECTS.find(function(p) { return p.slug === route.slug; }) : null;

      useEffect(function() {
        if (activeProject) document.title = activeProject.title + " - Vector Studio";
        else if (route.page === "studio") document.title = "Studio - Vector Studio";
        else if (route.page === "contact") document.title = "Contact - Vector Studio";
        else document.title = "Vector Studio";
      }, [route, activeProject]);

      return (
        <>
          {!introDone && <IntroOverlay onDone={function() { setIntroDone(true); }} />}
          {!activeProject && <Nav onNav={handleNav} page={route.page} />}
          {route.page === "projects" && !activeProject && <Gallery projects={window.PROJECTS} onEnter={handleEnter} />}
          {route.page === "studio" && <StudioPage />}
          {route.page === "contact" && <ContactPage />}
          {activeProject && (
            <ProjectDetail key={activeProject.id} project={activeProject} allProjects={window.PROJECTS}
              onBack={handleBack} onNext={handleNext} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
